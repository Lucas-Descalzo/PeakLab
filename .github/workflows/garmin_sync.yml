name: Garmin Daily Sync

on:
  schedule:
    # Todos los días a las 12:00 UTC = 09:00 AM Argentina (UTC-3)
    # A las 9am el sueño ya está procesado en Garmin Connect
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Días hacia atrás a sincronizar'
        required: false
        default: '2'

jobs:
  sync:
    runs-on: ubuntu-latest
    # 15 min: con tokens pre-cargados no hay login, no hay backoff
    timeout-minutes: 15
    env:
      GARMIN_TOKENS_B64: ${{ secrets.GARMIN_TOKENS_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Restaurar caché siempre: puede tener tokens más frescos que el secret
      # (el script en Python decide qué fuente usar: env var > disco)
      - name: Restore Garmin tokens from cache
        uses: actions/cache@v4
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
          restore-keys: garmin-tokens-

      - name: Run Garmin sync
        env:
          APP_URL: ${{ secrets.APP_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          DAYS=${{ github.event.inputs.days || '2' }}
          echo "Sincronizando $DAYS días..."
          python scripts/garmin_sync.py $DAYS

      # Guardar tokens aunque el step anterior haya fallado
      - name: Save Garmin tokens to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
