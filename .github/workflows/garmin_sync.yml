name: Garmin Daily Sync

on:
  schedule:
    # Todos los días a las 12:00 UTC = 09:00 AM Argentina (UTC-3)
    # A las 9am el sueño ya está procesado en Garmin Connect
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Días hacia atrás a sincronizar'
        required: false
        default: '2'

jobs:
  sync:
    runs-on: ubuntu-latest
    # 90 min: suficiente para 3 reintentos de login con backoff (2+5+10 min)
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Cache de tokens Garmin: evita hacer login en cada run
      - name: Restore Garmin tokens
        uses: actions/cache@v4
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
          restore-keys: garmin-tokens-

      - name: Run Garmin sync
        env:
          GARMIN_USER: ${{ secrets.GARMIN_USER }}
          GARMIN_PASS: ${{ secrets.GARMIN_PASS }}
          APP_URL: ${{ secrets.APP_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          DAYS=${{ github.event.inputs.days || '2' }}
          echo "Sincronizando $DAYS días..."
          python scripts/garmin_sync.py $DAYS

      # Guardar tokens aunque el step anterior haya fallado,
      # para que el próximo run los reutilice y evite el SSO
      - name: Save Garmin tokens
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
