name: Garmin Daily Sync

on:
  schedule:
    # Todos los días a las 12:00 UTC = 09:00 AM Argentina (UTC-3)
    # A las 9am el sueño ya está procesado en Garmin Connect
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Días hacia atrás a sincronizar'
        required: false
        default: '2'

jobs:
  sync:
    runs-on: ubuntu-latest
    # 15 min: con tokens pre-cargados no hay login, no hay backoff
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Prioridad 1: tokens pre-generados localmente (base64 en secret)
      # Esto evita el login con usuario/contraseña por completo.
      # Ver README del workflow para cómo generar GARMIN_TOKENS_B64.
      - name: Seed Garmin tokens from secret
        if: ${{ secrets.GARMIN_TOKENS_B64 != '' }}
        env:
          GARMIN_TOKENS_B64: ${{ secrets.GARMIN_TOKENS_B64 }}
        run: |
          mkdir -p ~/.garmin_tokens
          echo "$GARMIN_TOKENS_B64" | base64 -d | tar xz -C ~/.garmin_tokens
          echo "✓ Tokens restaurados desde secret GARMIN_TOKENS_B64"

      # Prioridad 2: cache de runs anteriores (cuando ya hubo un login exitoso)
      - name: Restore Garmin tokens from cache
        if: ${{ secrets.GARMIN_TOKENS_B64 == '' }}
        uses: actions/cache@v4
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
          restore-keys: garmin-tokens-

      - name: Run Garmin sync
        env:
          GARMIN_USER: ${{ secrets.GARMIN_USER }}
          GARMIN_PASS: ${{ secrets.GARMIN_PASS }}
          APP_URL: ${{ secrets.APP_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          DAYS=${{ github.event.inputs.days || '2' }}
          echo "Sincronizando $DAYS días..."
          python scripts/garmin_sync.py $DAYS

      # Guardar tokens aunque el step anterior haya fallado
      - name: Save Garmin tokens to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.garmin_tokens
          key: garmin-tokens-v1
